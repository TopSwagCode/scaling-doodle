<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIM SPARQL Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-inner">
      <h1>CIM SPARQL Explorer</h1>
      <div class="topbar-actions">
        <span id="topbar-loaded" class="topbar-loaded" hidden></span>
        <button id="btn-settings" class="btn-icon" title="Settings">&#9881;</button>
      </div>
    </div>
  </header>

  <!-- Settings drawer -->
  <div id="settings-drawer" class="settings-drawer" hidden>
    <div class="settings-drawer-inner">
      <div class="settings-header">
        <span class="settings-title">Settings</span>
        <button id="btn-close-settings" class="btn-icon" title="Close">&#10005;</button>
      </div>

      <div class="field">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="Enter API key..." />
      </div>
      <button id="btn-save-key" class="btn btn-primary btn-block">Save Key</button>
      <p id="settings-status" class="text-muted"></p>

      <hr class="settings-divider" />

      <div class="settings-section">
        <label class="field-label">Source folder (CGMES root)</label>
        <p class="settings-hint">
          Root folder with CGMES zip files. Paste this path in the picker:
          <code>//fs61.si.energinet.local/DriftData/Drift/Arkiv/CGMES/</code>
        </p>
        <div class="folder-row">
          <button id="btn-pick-source" class="btn btn-ghost">Select folder...</button>
          <span id="source-folder-label" class="text-muted">Not selected</span>
        </div>
      </div>

      <hr class="settings-divider" />

      <div class="settings-section">
        <label class="field-label">Destination folder (query exports)</label>
        <p class="settings-hint">Where exported CSV query results will be saved.</p>
        <div class="folder-row">
          <button id="btn-pick-dest" class="btn btn-ghost">Select folder...</button>
          <span id="dest-folder-label" class="text-muted">Not selected</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main layout -->
  <div class="layout" id="layout" data-view="both">

    <!-- Left panel: scenario search -->
    <aside class="panel panel-scenarios" id="panel-left">
      <div class="panel-bookmark">Scenarios</div>
      <div class="panel-header">
        <h2 class="panel-title-inline">Scenarios</h2>
        <div class="panel-actions">
          <button id="btn-expand-left" class="btn-icon btn-icon-sm" title="Maximize">&#9723;</button>
          <button id="btn-restore-left" class="btn-icon btn-icon-sm" title="Split view" hidden>&#9724;</button>
        </div>
      </div>

      <div class="panel-body" id="body-left">
        <div class="form-grid">
          <div class="field">
            <label for="date-from">From</label>
            <input type="datetime-local" id="date-from" />
          </div>
          <div class="field">
            <label for="date-to">To</label>
            <input type="datetime-local" id="date-to" />
          </div>
          <div class="field">
            <label for="scenario-type-select">Type</label>
            <select id="scenario-type-select">
              <option value="">All</option>
            </select>
          </div>
          <div class="field">
            <label for="take-input">Limit</label>
            <input type="number" id="take-input" value="100" min="1" max="10000" />
          </div>
        </div>

        <button id="btn-fetch-scenarios" class="btn btn-primary btn-block">Fetch Scenarios</button>

        <div id="scenario-table-wrap" hidden>
          <p id="scenario-results-info" class="text-muted scenario-results-info"></p>
          <div class="scenario-table-scroll">
            <table class="scenario-table">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Type</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="scenario-table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </aside>

    <!-- Right panel: query -->
    <section class="panel panel-query" id="panel-right">
      <div class="panel-bookmark">SPARQL Query</div>
      <div class="panel-header">
        <div class="panel-header-left">
          <h2 class="panel-title-inline">SPARQL Query</h2>
          <span id="loaded-badge" class="loaded-badge" hidden></span>
        </div>
        <div class="panel-actions">
          <button id="btn-expand-right" class="btn-icon btn-icon-sm" title="Maximize">&#9723;</button>
          <button id="btn-restore-right" class="btn-icon btn-icon-sm" title="Split view" hidden>&#9724;</button>
        </div>
      </div>

      <div class="panel-body" id="body-right">
        <div class="field">
          <label for="query-select">Predefined queries</label>
          <select id="query-select">
            <option value="">-- Select a query --</option>
          </select>
        </div>

        <div class="field">
          <label for="query-input">Query</label>
          <textarea id="query-input" rows="12" spellcheck="false" placeholder="Enter SPARQL query..."></textarea>
        </div>

        <button id="btn-run-query" class="btn btn-primary btn-block" disabled>Run Query</button>

        <div id="query-result"></div>

        <button id="btn-export-csv" class="btn btn-ghost btn-block" hidden>Export CSV</button>
      </div>
    </section>

  </div>

  <!-- Console (always visible, fixed bottom) -->
  <div class="console collapsed" id="console-panel">
    <div class="console-header">
      <span class="console-title">Console</span>
      <div class="console-actions">
        <span id="console-summary" class="console-summary"></span>
        <div class="progress-bar console-progress"><div id="console-progress-fill" class="progress-fill"></div></div>
        <button id="btn-clear-console" class="btn-icon btn-icon-sm" title="Clear">&#10005;</button>
        <button id="btn-toggle-console" class="btn-icon btn-icon-sm" title="Toggle console">&#9660;</button>
      </div>
    </div>
    <div id="console-log" class="console-log"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
